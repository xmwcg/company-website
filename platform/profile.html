<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人资料 - 金奕鸣科技</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1A1A1A;
      --accent: #C9A84C;
      --accent-light: #E5C76B;
      --background: #FAFAFA;
      --surface: #FFFFFF;
      --text-primary: #1A1A1A;
      --text-secondary: #666666;
      --text-muted: #999999;
      --border: #E5E5E5;
      --radius: 4px;
      --radius-md: 8px;
      --font-display: 'Noto Serif SC', serif;
      --font-body: 'Noto Sans SC', sans-serif;
    }

    * { margin:0; padding:0; box-sizing: border-box; }
    
    body {
      font-family: var(--font-body);
      background: var(--background);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ==================== Header ==================== */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
    }

    .header-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 64px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
    }

    .logo span { color: var(--accent); }

    .header-nav {
      display: flex;
      gap: 0.5rem;
    }

    .nav-item {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: var(--radius);
      transition: all 0.3s ease;
    }

    .nav-item:hover, .nav-item.active {
      background: var(--background);
      color: var(--text-primary);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent) 0%, #A68A3A 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
    }

    /* ==================== Main Content ==================== */
    .main {
      padding-top: 64px;
      min-height: 100vh;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 2rem;
    }

    /* ==================== Profile Form ==================== */
    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .avatar-section {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .avatar-large {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--accent) 0%, #A68A3A 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 2rem;
    }

    .avatar-actions {
      display: flex;
      gap: 0.75rem;
    }

    .btn {
      padding: 0.6rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: var(--font-body);
    }

    .btn-ghost {
      background: var(--background);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-family: var(--font-body);
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .btn-save {
      background: var(--primary);
      border: none;
      color: white;
      padding: 0.85rem 2rem;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-save:hover {
      background: var(--accent);
    }

    .form-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-container">
      <a href="index.html" class="logo">金<span>奕</span>鸣科技</a>
      
      <nav class="header-nav">
        <a href="index.html" class="nav-item">控制台</a>
        <a href="files.html" class="nav-item">文件管理</a>
        <a href="messages.html" class="nav-item">消息中心</a>
      </nav>

      <div class="header-right">
        <div class="user-info" id="userDropdown">
          <div class="user-avatar">李</div>
          <span>李先生</span>
          <span>▼</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <h1 class="page-title">👤 个人资料</h1>

    <div class="profile-card">
      <div class="avatar-section">
        <div class="avatar-large">李</div>
        <div class="avatar-actions">
          <button class="btn btn-ghost" onclick="alert('上传头像功能需要后端支持\n当前为静态演示版本')">上传新头像</button>
          <button class="btn btn-ghost" style="color: #E53935;" onclick="alert('移除头像功能需要后端支持')">移除</button>
        </div>
      </div>

      <form id="profileForm" onsubmit="saveProfile(event)">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input type="text" class="form-input" value="李先生" id="userName">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">手机号码</label>
            <input type="tel" class="form-input" value="135****0881" id="userPhone" disabled>
          </div>
          <div class="form-group">
            <label class="form-label">电子邮箱</label>
            <input type="email" class="form-input" placeholder="请输入邮箱" id="userEmail">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">公司名称</label>
            <input type="text" class="form-input" placeholder="请输入公司名称" id="userCompany">
          </div>
          <div class="form-group">
            <label class="form-label">职位</label>
            <input type="text" class="form-input" placeholder="请输入职位" id="userTitle">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">个人简介</label>
          <textarea class="form-input" rows="4" placeholder="请输入个人简介" id="userBio"></textarea>
        </div>

        <div class="form-footer">
          <button type="submit" class="btn-save">保存修改</button>
        </div>
      </form>
    </div>
  </main>

  <script>
    function saveProfile(e) {
      e.preventDefault();
      alert('个人资料已保存！\n\n（这是静态演示版本，实际项目中会保存到数据库）');
    }
  </script>
</body>
</html>
