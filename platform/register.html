<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 金奕鸣科技</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1A1A1A;
      --secondary: #2D2D2D;
      --accent: #C9A84C;
      --accent-light: #E5C76B;
      --accent-dark: #A68A3A;
      --background: #FAFAFA;
      --surface: #FFFFFF;
      --text-primary: #1A1A1A;
      --text-secondary: #666666;
      --text-muted: #999999;
      --border: #E5E5E5;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.06);
      --radius: 4px;
      --radius-md: 8px;
      --font-display: 'Noto Serif SC', serif;
      --font-body: 'Noto Sans SC', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--background);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .register-container {
      width: 100%;
      max-width: 420px;
    }

    .register-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 3rem 2.5rem;
      box-shadow: var(--shadow-md);
    }

    .register-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .register-logo {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 1.5rem;
    }

    .register-logo span { color: var(--accent); }

    .register-header h1 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .register-header p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-family: var(--font-body);
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.1);
    }

    .input-group {
      display: flex;
      gap: 0.75rem;
    }

    .input-group .form-input { flex: 1; }

    .btn-code {
      padding: 0.85rem 1.25rem;
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s ease;
    }

    .btn-code:hover {
      background: var(--accent);
      color: var(--primary);
      border-color: var(--accent);
    }

    .btn-register {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      color: var(--primary);
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 0.5rem;
    }

    .btn-register:hover { background: var(--accent-light); }

    .agreement {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 1rem;
    }

    .agreement input[type="checkbox"] {
      margin-top: 0.2rem;
      accent-color: var(--accent);
    }

    .agreement a {
      color: var(--accent);
      text-decoration: none;
    }

    .register-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .register-footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .back-home {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      transition: color 0.3s ease;
    }

    .back-home:hover { color: var(--accent); }

    @media (max-width: 480px) {
      .register-card { padding: 2rem 1.5rem; }
      .input-group { flex-direction: column; }
      .btn-code { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="register-container">
    <a href="../index.html" class="back-home">← 返回首页</a>
    
    <div class="register-card">
      <div class="register-header">
        <a href="../index.html" class="register-logo">金<span>奕</span>鸣科技</a>
        <h1>创建账户</h1>
        <p>加入我们，开启智能服务之旅</p>
      </div>

      <form id="registerForm">
        <div class="form-group">
          <label class="form-label">手机号码</label>
          <input type="tel" class="form-input" id="regPhone" placeholder="请输入手机号" maxlength="11" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">验证码</label>
          <div class="input-group">
            <input type="text" class="form-input" id="regCode" placeholder="请输入验证码" maxlength="6" required>
            <button type="button" class="btn-code" id="sendRegCode">获取验证码</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">设置密码</label>
          <input type="password" class="form-input" id="regPwd" placeholder="8-20位，字母+数字组合" required>
        </div>

        <div class="form-group">
          <label class="form-label">确认密码</label>
          <input type="password" class="form-input" id="regPwdConfirm" placeholder="请再次输入密码" required>
        </div>

        <div class="agreement">
          <input type="checkbox" id="agreeTerms" required>
          <span>我已阅读并同意 <a href="#">《服务条款》</a> 和 <a href="#">《隐私政策》</a></span>
        </div>

        <button type="submit" class="btn-register">立即注册</button>
      </form>

      <p class="register-footer">
        已有账户？<a href="login.html">立即登录</a>
      </p>
    </div>
  </div>

  <script>
    // 发送验证码
    let countdown = 0;
    document.getElementById('sendRegCode').addEventListener('click', function() {
      if (countdown > 0) return;
      
      const phone = document.getElementById('regPhone').value;
      if (!/^1[3-9]\d{9}$/.test(phone)) {
        alert('请输入正确的手机号');
        return;
      }
      
      countdown = 60;
      this.disabled = true;
      this.textContent = countdown + '秒后重试';
      
      const timer = setInterval(() => {
        countdown--;
        if (countdown <= 0) {
          clearInterval(timer);
          this.disabled = false;
          this.textContent = '获取验证码';
        } else {
          this.textContent = countdown + '秒后重试';
        }
      }, 1000);
      
      console.log('发送注册验证码到: ' + phone);
    });

    // 注册表单提交
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const phone = document.getElementById('regPhone').value;
      const code = document.getElementById('regCode').value;
      const pwd = document.getElementById('regPwd').value;
      const pwdConfirm = document.getElementById('regPwdConfirm').value;
      const agreeTerms = document.getElementById('agreeTerms').checked;
      
      if (!/^1[3-9]\d{9}$/.test(phone)) {
        alert('请输入正确的手机号');
        return;
      }
      
      if (!code || code.length !== 6) {
        alert('请输入6位验证码');
        return;
      }
      
      if (!/^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,20}$/.test(pwd)) {
        alert('密码需为8-20位字母+数字组合');
        return;
      }
      
      if (pwd !== pwdConfirm) {
        alert('两次密码输入不一致');
        return;
      }
      
      if (!agreeTerms) {
        alert('请阅读并同意服务条款和隐私政策');
        return;
      }
      
      const btn = this.querySelector('.btn-register');
      btn.textContent = '注册中...';
      btn.disabled = true;
      
      // 模拟注册
      setTimeout(() => {
        alert('注册成功！即将跳转到登录页面...');
        window.location.href = 'login.html';
      }, 1500);
    });
  </script>
</body>
</html>
